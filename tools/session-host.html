<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BookGrok Session Host Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --brand-accent: #b45309;
    --brand-accent-bright: #d97706;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    --radius-card: 18px;
    --radius-box: 14px;
    --radius-pill: 999px;
  }
  * {
    box-sizing: border-box;
  }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    font-family: var(--sans);
    background: #171310;
    color: #f5efe6;
  }
  .grid {
    display: grid;
    grid-template-columns: minmax(240px, 0.9fr) 2.6fr 1.4fr;
    grid-template-rows: minmax(280px, 0.62fr) 1fr;
    height: 100vh;
    gap: 2px;
    background: #0c0a08;
  }
  .region {
    background: #171310;
    overflow: auto;
    padding: 16px;
  }

  #cover-region {
    grid-column: 1;
    grid-row: 1 / span 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #cover-region img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  #question-region {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    align-items: center;
  }
  .question-text {
    width: 100%;
    font-family: var(--serif);
    font-size: 2.1rem;
    line-height: 1.3;
    font-weight: 400;
    letter-spacing: -0.01em;
    outline: none;
    border: 1px dashed transparent;
    border-radius: 8px;
    padding: 4px 8px;
  }
  .question-text:focus {
    border-color: var(--brand-accent);
  }

  #wheel-region {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wheel-stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wheel-canvas-host {
    position: relative;
    aspect-ratio: 1;
    height: 96%;
    max-width: 96%;
  }
  .wheel-pointer {
    position: absolute;
    top: 50%;
    left: 100%;
    transform: translate(-1px, -50%);
    width: 0;
    height: 0;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-right: 26px solid var(--brand-accent-bright);
    z-index: 2;
    filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.4));
  }

  #wheel-names-region {
    grid-column: 3;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    gap: 12px;
    justify-content: center;
  }
  .wheel-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .wheel-pool-input {
    width: 100%;
    font-family: inherit;
    font-size: 0.9rem;
    background: #241d17;
    color: #f5efe6;
    border: 1px solid #4a3d30;
    border-radius: var(--radius-box);
    padding: 8px 10px;
  }
  .wheel-winner {
    min-height: 2.2rem;
    font-family: var(--serif);
    font-size: 1.6rem;
    line-height: 1.3;
    font-weight: 400;
    color: var(--brand-accent-bright);
  }
  .wheel-winner-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .wheel-winner-actions button[hidden] {
    display: none;
  }

  #timer-region {
    grid-column: 3;
    grid-row: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
  }
  .timer-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }
  .hourglass {
    flex: none;
  }
  .hourglass-sand-top, .hourglass-sand-bottom, .hourglass-stream {
    fill: var(--brand-accent-bright);
  }
  .hourglass-frame {
    stroke: #4a3d30;
    fill: none;
    stroke-width: 3;
    stroke-linejoin: round;
  }
  .hourglass-cap {
    fill: #4a3d30;
  }
  .timer-display {
    font-family: var(--serif);
    font-size: 2.1rem;
    font-weight: 400;
    color: var(--brand-accent-bright);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    line-height: 1;
  }
  .timer-duration-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .timer-duration-input {
    width: 48px;
    font-family: inherit;
    font-size: 0.9rem;
    background: #241d17;
    color: #f5efe6;
    border: 1px solid #4a3d30;
    border-radius: 8px;
    padding: 4px 6px;
    text-align: center;
  }
  .timer-presets, .timer-controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: inherit;
    font-size: 0.85rem;
    background: #241d17;
    color: #f5efe6;
    border: 1px solid #4a3d30;
    border-radius: var(--radius-pill);
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  button:hover:not(:disabled) {
    background: var(--brand-accent);
    border-color: var(--brand-accent);
    color: #fff;
  }
  button:active:not(:disabled) {
    background: var(--brand-accent-bright);
    border-color: var(--brand-accent-bright);
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>
  <div class="grid">
    <div id="cover-region" class="region"></div>
    <div id="question-region" class="region"></div>
    <div id="timer-region" class="region"></div>
    <div id="wheel-region" class="region"></div>
    <div id="wheel-names-region" class="region"></div>
  </div>

  <script type="module">
    import { initCover } from './cover.js';
    import { initQuestion } from './question.js';
    import { initTimer } from './timer.js';
    import { initWheel } from './wheel.js';

    initCover(document.getElementById('cover-region'));
    initQuestion(document.getElementById('question-region'));
    initWheel(document.getElementById('wheel-region'), document.getElementById('wheel-names-region'));
    initTimer(document.getElementById('timer-region'));
  </script>
</body>
</html>
